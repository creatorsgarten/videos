      title: Case Developing Gamify Coding Education (K-12) by Songklod Saengvoratip
      description: >-
        ปัญหาการศึกษาไทยในยุคดิจิทัลและ AI คืออะไร? มาร่วมหาคำตอบกับคุณตูนจาก
        Spark Education ในเซสชั่นนี้  เขาจะมาแบ่งปันประสบการณ์การพัฒนาแพลตฟอร์ม
        CodeVenture และ CodingThailand เพื่อสอน coding ให้เด็กๆ ทั่วประเทศ 
        ฟังเรื่องราวการแก้ปัญหาการเรียน coding ที่ยากและน่าเบื่อ 
        พร้อมเรียนรู้แนวคิดการสร้างเกมและสื่อการสอนที่น่าสนใจ 
        รวมถึงความท้าทายในการทำงานร่วมกับโรงเรียนและคุณครูทั่วประเทศ  มาดูกันว่า
        CodeVenture จะช่วยเตรียมความพร้อมเด็กไทยสำหรับอนาคตได้อย่างไร


