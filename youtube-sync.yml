    id: JPNxUQS5xqA
    snippet:
      title: นักศึกษาแพทย์บางมด 🐜 | Stupido Hackettino ๙
      description: >-
        Shitty TA Tool - A TA's revenge tool that run my custom Worm Apps built
        to confuse and/or distract students who won't stop playing roblox in
        classroom


        เครื่องมือสำหรับผู้ช่วยสอน (TA)
        ที่ต้องรับมือกับนักเรียนที่แอบเล่นเกมในห้องเรียน โดยมาในรูปแบบของไวรัส
        "แม่มึง" ที่ถูกออกแบบมาอย่างแยบยล เมื่อนักเรียนพยายามเปิดเกม
        โปรแกรมจะทำงานทันทีด้วยการส่งเสียงเตือนอาจารย์ดังลั่น,
        ทำให้หน้าจอกะพริบอย่างรุนแรง,
        และทำการโหลดรูปภาพจำนวนมากลงเครื่องจนคอมพิวเตอร์ค้างและใช้งานต่อไม่ได้
        เป็นการแก้ปัญหาเด็กติดเกมด้วยวิธีที่เด็ดขาดและน่าจดจำ


