    snippet:
      title: Custom Postgres Checkpointer using LangGraph by Williams Sissoko
      description: >-
        Delve into the world of AI application development with Will, founder of
        Reacthor, as he guides you through building custom workflows using
        LangChain and LangGraph. Learn how these powerful tools can be leveraged
        to create sophisticated AI applications, particularly focusing on the
        innovative concept of a custom PostgreSQL checkpointer. Will shares
        practical insights and real-world examples, including a case study with
        Salary Hero, showcasing how LangChain and LangGraph can be used to
        address complex challenges in a production environment. Discover how
        these technologies can empower your AI development journey and unlock
        new possibilities for building intelligent and efficient applications.


        0:00 | Introduction and Overview of Custom AI Workflows

        0:51 | LangChain vs. Traditional SDKs: Key Differences and Benefits

        2:40 | Introducing LangGraph: A Powerful Tool for Building AI
        Applications

