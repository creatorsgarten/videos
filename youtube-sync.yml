    snippet:
      title: OpenClaw VPS with Thailand Telephony by Wichaya Sropas
      description: >-
        เมื่อเอา AI มาเชื่อมต่อกับระบบโทรศัพท์ตอบกลับอัตโนมัติในภาษาไทย! 🇹🇭📞
        ดูวิธีการผสานพลังของ OpenClaw เข้ากับ VPS และระบบ Telephony
        ในประเทศไทยโดยคุณ J Sropas ปลดล็อกข้อจำกัดเดิมๆ สู่การสร้าง Use Case
        ที่ใช้งานได้จริงในบ้านเรา!


        0:00 | แรงบันดาลใจการสร้างระบบจากคลิปยูทูบ และ Demo สายเรียกเข้าจาก AI

        1:45 | แนะนำผู้พูดและการเชื่อมต่อ OpenClaw เข้ากับตู้สาขา IP-PBX
        ด้วยงบประหยัด

        3:07 | สถาปัตยกรรมระบบ: การเชื่อมต่อโทรศัพท์กับเทคโนโลยีเสียงและ AI
        (STT, LLM, TTS)

        4:49 | โชว์หน้าต่างจัดการ Agent พื้นฐานที่ใช้ AI ช่วยเขียนระบบให้

        6:00 | เบื้องหลังการทำงาน: การคุมพฤติกรรม AI ด้วย System Prompt และ
        Guardrail

        7:26 | Demo 1: ให้ AI ตอบคำถามสเตตัสเซิร์ฟเวอร์ (การใช้ CPU
        และฮาร์ดดิสก์)

        9:44 | Demo 2: ใช้ Agent โทรไปทำรายการจองคิวนวดแผนโบราณอัตโนมัติ

        11:03 | ศักยภาพในการรองรับสายแบบไม่จำกัด
        และข้อจำกัดด้านใช้งานเชิงพาณิชย์

        12:05 | ยกระดับระบบเป็น API เพื่อบริการที่ลื่นไหลและเป็นมืออาชีพมากขึ้น

