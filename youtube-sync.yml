    snippet:
      title: Web MCP นี่ Real หรือ Cake by Warat Wongmaneekit
      description: >-
        คุณตั้ง Chief Product Officer จาก Wisesight จะพามาทำความรู้จักกับ Web
        MCP ซึ่งเป็นมาตรฐานการเชื่อมต่อรูปแบบใหม่ที่ตั้งเป้าจะปรับเปลี่ยนวิธีที่
        AI ทำงานร่วมกับเว็บไซต์ ปัจจุบัน AI browser มักอาศัยการอ่าน HTML
        หรือถ่าย screenshot ซึ่งกินทรัพยากร ทำงานช้า เปลือง token
        และมีความเสี่ยงปัญหาด้านความปลอดภัย เทคโนโลยี Web MCP
        จึงเข้ามาช่วยแก้ปัญหาโดยให้นักพัฒนาเว็บสามารถประกาศ tool ผ่านรูปแบบ
        imperative หรือ declarative เพื่อให้ agent
        รับรู้และเลือกเรียกใช้ได้เฉพาะฟังก์ชันที่อนุญาต 


        คุณตั้งจะมาบรรยายถึงจุดเริ่มต้นของโปรเจกต์นี้
        พร้อมสาธิตการทำงานเบื้องต้น
        ไปจนถึงชวนคิดวิเคราะห์แนวโน้มในอนาคตว่ามาตรฐานดังกล่าวจะถูกนำมาใช้งานอย่างแพร่หลายจริงหรือไม่
        รวมถึงแบ่งปันแง่มุมการปรับตัวของคนทำงานในวงการสายเทคโนโลยี เมื่อ AI
        เริ่มมีความสามารถสูงขึ้นและเข้ามาทดแทนการทำงานต่างๆ ได้อย่างรวดเร็ว


        0:00 | เกริ่นนำและแนะนำตัวผู้บรรยาย

        1:17 | MCP คืออะไร: มาตรฐานตัวกลางที่ช่วยให้ AI Agent เรียก API
        ได้เป็นระบบ

        3:13 | สำรวจตลาด AI Browser และจุดเริ่มต้นความจำเป็นของ Web MCP

        4:15 | ปัญหาความอืดและกิน Token จากการไถอ่าน HTML และสแนปภาพหน้าเว็บของ
        AI

        6:09 | ช่องทางมาตรฐาน Web MCP: แกัปัญหากวนใจด้าน Security และ Privacy
        ของเว็บ

        7:46 | เริ่มทดลองใช้งาน Web MCP บน Google Chrome ด้วย Flag Setting

        8:41 | 2 วิธีการเปิดช่องทางให้ AI ใช้งาน Tools: รูปแบบ Imperative และ
        Declarative API

        10:48 | Demo สาธิตการใช้งานจริง: เมื่อ AI อ่าน Tool
        การจองโต๊ะและกรอกฟอร์มอัตโนมัติ

        13:01 | ทิศทาง Local API: พัฒนา AI
        บนเบราว์เซอร์ให้ประมวลผลจบภายในเครื่อง (On-device)

        14:37 | ตอบข้อสงสัย: หากเบราว์เซอร์ต้องรันเว็บที่ไม่มีมาตรฐาน Web MCP
        จะทำอย่างไร?

        17:13 | มุมมองส่วนตัว: ถ้าโมเดล AI ฉลาดและแม่นยำขึ้น
        มาตรฐานนี้อาจลดความสำคัญลง

        19:56 | ความกังวลเรื่อง AI แย่งคนทำงาน
        และข้อคิดการใช้ชีวิตท่ามกลางเทคโนโลยีที่คาดเดาไม่ได้


