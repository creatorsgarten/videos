video:qY4ivayRT5k:
  spec:
    id: qY4ivayRT5k
    snippet:
      title: Deploying OpenClaw Without Getting Fired by Pichaya Morimoto
      description: >-
        อยากเอา AI ไปใช้ในองค์กรแต่กลัวระบบพังจนโดนไล่ออก? 😅
        ปัญหาปวดหัวนี้จะหมดไป! ฟังทางนี้ด่วน คุณพิชญะ โมริโมโตะ ตัวจริงวงการ
        Security จะมาแชร์ทริคเด็ดในการ Deploy OpenClaw ให้ปลอดภัย ใช้งานได้จริง
        และที่สำคัญ... เซฟเก้าอี้ทำงานของคุณไว้ได้ชัวร์! 🛡️


        0:00 | ทำไมการใช้ OpenClaw ในระดับองค์กรถึงต้องระวังเรื่องความปลอดภัย

        1:08 | ข้อควรระวังในการติดตั้ง OpenClaw และคำเตือนที่หลายคนมักกดข้าม

        2:39 | คำแนะนำจาก Microsoft: แยกเครื่องที่รัน OpenClaw ออกจาก Production
        Server

        4:30 | การตั้งค่าเริ่มต้นที่ปลอดภัย (Secure by Default) ใน OpenClaw
        เวอร์ชันใหม่

        6:14 | Tool Profile:
        ฟีเจอร์ใหม่ที่ช่วยจำกัดการเข้าถึงไฟล์และคำสั่งบนเครื่อง

        8:02 | Lockdown ขั้นที่ 1: การทำ Network Isolation และวางระบบ Monitoring

        10:27 | Lockdown ขั้นที่ 2: ใช้ Docker Sandboxing
        เพื่อจำกัดขอบเขตการทำงาน

        13:51 | Lockdown ขั้นที่ 3: เปิดใช้ Exec Approval
        เพื่อตรวจสอบคำสั่งก่อนให้ AI รัน

        16:22 | Lockdown ขั้นที่ 4: ป้องกัน Prompt Injection และจัดการ API Key
        ด้วย SecretRef


