video:yNP8NExFpJQ:
  spec:
    id: yNP8NExFpJQ
    snippet:
      title: Making a Machine Readable Me by John F.X. Berns
      description: >-
        จะเกิดอะไรขึ้นถ้า AI สามารถเข้าใจ "ตัวตน" ของเราได้ทะลุปรุโปร่ง? 🤖🧠
        ร่วมสำรวจแนวคิดสุดล้ำในการสร้าง "Digital Twin"
        และการแปลงบริบทของมนุษย์ให้กลายเป็นข้อมูลที่ AI อ่านและเข้าใจได้ กับ
        John F.X. Berns สู่ก้าวใหม่ของการใช้ AI ให้ตอบโจทย์แบบ Personalized สุดๆ


        0:00 | Personalized AI requires balancing useful context with data
        privacy

        1:38 | Seek a middle ground between useless anonymity and dangerous full
        exposure

        2:43 | Tune the strictness of PII masking with tools like Microsoft
        Presidio

        3:57 | Leverage privacy laws like GDPR to request deep social media data
        exports

        5:34 | Raw social media data exports are often scattered and unreadable

        7:02 | Use AI to organize raw data into relationship graphs before
        scrubbing it offline

        9:23 | Summary: Download, organize, offline scrub, and securely feed
        your AI


