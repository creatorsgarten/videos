video:GNxv__OGTQc:
  spec:
    id: GNxv__OGTQc
    snippet:
      title: ทำ Game Engine บนเว็บมันจะทำยากแค่ไหนเชียว by Phoomparin Mano
      description: >-
        คุณภูมิ นักพัฒนาจาก Metabase พาเจาะลึกเบื้องหลังการพัฒนา Patchies
        โปรเจกต์แอปพลิเคชัน visual programming บนเว็บเบราว์เซอร์
        เซสชันนี้จะพาไปทำความเข้าใจแนวคิด Object-Oriented Programming (OOP)
        แบบดั้งเดิมของ Alan Kay ที่เน้นการทำงานแบบส่งข้อความระหว่างออบเจกต์
        ซึ่งเป็นรากฐานของโปรแกรมแขนงดนตรีอย่าง Max/MSP 


        นอกจากนี้ยังมีการอธิบายถึงความท้าทายในการสร้างแอปพลิเคชันที่ต้องประมวลผลกราฟิกและเสียงพร้อมกัน
        โดยคุณภูมิจะมาเล่าเทคนิคการจัดการประสิทธิภาพด้วยการเขียนโปรแกรมแบบ
        parallel ผ่านการใช้ web worker, OffscreenCanvas และ AudioWorklet
        รวมถึงการใช้ WebAssembly เพื่อทลายข้อจำกัดของ JavaScript
        ทำให้สามารถรันภาษาอื่นๆ อย่าง Python หรือเครื่องมือหนักๆ
        ภายในเบราว์เซอร์ได้ ตลอดจนแสดงตัวอย่างการเชื่อมต่อฮาร์ดแวร์ภายนอกผ่าน
        Web Serial


        0:00 | แนะนำ Patchies:
        โปรเจกต์เปลี่ยนการเขียนโปรแกรมให้เห็นภาพและโต้ตอบได้

        1:45 | OOP ที่แท้จริงของ Alan Kay คือการส่ง Message
        เหมือนโครงสร้างเซลล์สิ่งมีชีวิต

        3:01 | เรียนรู้ OOP ดั้งเดิมและทฤษฎี Actor Model ผ่านแอปสายทำเพลง (Pure
        Data, Max/MSP)

        5:39 | หมดยุคการพิมพ์โค้ดด้วย Text?
        วิสัยทัศน์เบื้องหลังการเขียนโปรแกรมแบบ Visual

        7:38 | เดโมยกระดับ Game Engine: การจับตาดู Message ที่ Object
        คุยกันได้แบบสดๆ

        9:50 | รับมือการสลับการทำงานยุ่งเหยิง (Graphics, Sound) ด้วยระบบ
        Parallel

        11:37 | ทลายข้อจำกัด Web Thread ด้วย 3 ทหารเสือ: Web Worker,
        OffscreenCanvas, และ AudioWorklet

        12:43 | จัดระเบียบคิวการเรนเดอร์กราฟิกด้วยกราฟ DAG ไม่ให้หน้าจอค้าง

        16:14 | ลดคอขวด CPU รอ GPU (Synchronization Stall) ให้ไหลลื่นด้วย FBO
        และ PBO

        17:44 | แยกกระบวนการหนัก: รัน Python, Ruby, Assembly บน Web Worker

        19:51 | ความท้าทายในโลก Audio: หลีกเลี่ยงหน้ากาก Abstraction
        และงัดทักษะการเขียนโค้ดดิบแบบ C

        21:21 | ทะลุขีดจำกัดความเร็ว JavaScript ด้วยพลัง WebAssembly (รันภาษา
        ChucK และ uxn Emulator)

        23:29 | รวมร่างสถาปัตยกรรมสู่โปรเจกต์โลกจริง: ควบคุม Projection Mapping
        ด้วยโหนดนับร้อย

        25:06 | Q&A โชว์ของแถม: อ่านท่าทางมือเพื่อควบคุม Hardware จริงๆ ผ่าน Web
        Serial

        27:32 | ผสานร่าง AI ช่วยโปรแกรม: ใช้ Gemini 3 สร้างและประมวลผลโค้ด Patch
        ทันทีผ่านหน้า UI


