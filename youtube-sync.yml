video:2kFpxnaycyg:
  spec:
    id: 2kFpxnaycyg
    snippet:
      title: >-
        A journey of building large scale reusable web components by Varayut
        Lerdkanlayanawat
      description: >-
        Have you ever wondered what the process of building reusable web
        components that are used by 200+ developer teams looks like? In this
        talk, you will be walked through all aspects that need to be considered
        while designing and implementing reusable web components along with fun
        real-world examples.


        00:00 | เกริ่นนำ: ปัญหา UI ไม่สอดคล้องกันในระบบขนาดใหญ่

        00:53 | แนะนำวิทยากรและหัวข้อบรรยาย

