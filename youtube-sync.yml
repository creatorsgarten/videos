    snippet:
      title: Developing JS for Data Science tasks by Charunthon Limseelo
      description: >-
        มาเรียนรู้การประยุกต์ใช้ JavaScript ในงาน Data Science กับคุณโบท ชรันธร
        จาก Microsoft Learn Student Ambassadors และ Google Developer Student
        Clubs  เซสชั่นนี้จะพาคุณสำรวจความเป็นไปได้ของ JavaScript
        ที่ไม่ได้จำกัดเพียงแค่การพัฒนาเว็บไซต์ แต่ยังสามารถนำมาใช้ในงาน data
        science ได้อย่างน่าสนใจ ไม่ว่าจะเป็นการสร้าง portfolio, blog,
        หรือการทำงานกับข้อมูล  คุณโบทจะแนะนำ library และ framework สำคัญๆ ของ
        JavaScript สำหรับงานด้าน statistics, machine learning และ visualization 
        เช่น TensorFlow.js, D3.js, Chart.js และ Sigma.js พร้อมยกตัวอย่าง demo
        ที่น่าสนใจ


