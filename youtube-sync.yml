video:mUTdlKHbc40:
  spec:
    id: mUTdlKHbc40
    snippet:
      title: >-
        Engineering OpenClaw: Scalable, Safe, and Cost-Optimized Agents by
        Thannob, Sathapon, Natdhanai, Pre
      description: >-
        เจาะลึกสถาปัตยกรรมระดับวิศวกรรมเบื้องหลัง OpenClaw! ⚙️
        เรียนรู้วิธีการออกแบบ AI Agents จากทีม The AI Alliance
        ให้พร้อมรับมือกับผู้ใช้งานทุกสเกล ปลอดภัยขั้นสุด และที่สำคัญคือ
        "ประหยัดต้นทุน" แบบเห็นผล สาย Tech, Dev และ Data ห้ามพลาดคลิปนี้เด็ดขาด!


        0:00 | เริ่มต้น: ภาพรวมวิศวกรรม OpenClaw และเทคนิคการเพิ่มประสิทธิภาพ

        1:34 | วิวัฒนาการของตระกูล Claw: จาก Nanobot สู่ NullClaw
        เพื่อการประหยัดทรัพยากร

        4:19 | เบื้องหลังการทำงานของ Agent: การทำ Orchestration ด้วย ReAct
        Prompting

        7:42 | การติดตั้ง Local Model: แนะนำ vLLM และโมเดล Qwen ที่เก่งภาษาไทย

        10:12 | การรันโมเดลโดยไม่ต้องพึ่งการ์ดจอแรง: เทคนิคการผสม VRAM, RAM และ
        SSD

        11:27 | Token Optimization: เปรียบเทียบค่าใช้จ่ายภาษาไทยและเทคนิคประหยัด
        Token

        15:53 | Model Routing: การสลับใช้โมเดลเล็กและใหญ่ตามความยากของงาน

        17:52 | เทคนิคลดค่าใช้จ่าย Heartbeat: ใช้ Local LLM แทนการเรียก API ทุก
