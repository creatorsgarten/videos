video:XWKCKylOSh4:
  spec:
    id: XWKCKylOSh4
    snippet:
      title: Claude Code Hook by Nuttakit Kundum
      description: >-
        พบกับคุณเอฟที่จะมาแบ่งปันประสบการณ์การใช้งาน Claude Hook
        เพื่อแก้ปัญหาความไม่สะดวกในการต้องคอยเฝ้าหน้าจอขณะที่ AI
        กำลังประมวลผลงานยาวๆ โดยคุณเอฟได้นำแนวคิดจากคุณ Greg Baugues
        มาต่อยอดเพื่อสร้างระบบ sound notification
        ที่จะคอยแจ้งเตือนสถานะการทำงานในขั้นตอนต่างๆ ผ่านเสียง
        เนื้อหาในเซสชันนี้ครอบคลุมตั้งแต่การทำความเข้าใจ hook event ประเภทต่างๆ
        เช่น PostToolUse หรือ UserPromptSubmit ไปจนถึงวิธีการตั้งค่าไฟล์ JSON
        และการเขียนสคริปต์ python อย่างง่ายเพื่อเรียกใช้งานไฟล์เสียงจาก Epidemic
        Sound นอกจากนี้ยังมีการสาธิตตัวอย่างการใช้งานจริงที่ Claude
        สามารถทำงานตั้งแต่เขียนโค้ด ทดสอบ ไปจนถึงเปิด pull request
        พร้อมส่งเสียงรายงานสถานะให้เราทราบในแต่ละขั้นตอน
        ช่วยเปลี่ยนการนั่งเฝ้าหน้าจอให้เป็นการทำงานที่มีประสิทธิภาพและเพลิดเพลินยิ่งขึ้น


        0:00 | ที่มาของ Hook: วิธีแก้ปัญหาคนขี้เกียจที่ไม่อยากเฝ้าหน้าจอตอน AI
        ทำงาน

        0:59 | Hook คืออะไร? และเราสามารถดักจับ Event อะไรมาเล่นได้บ้าง

