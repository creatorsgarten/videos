  spec:
    id: ct2RhcBDeyE
    snippet:
      title: How to perform RAG and Vector Search with MongoDB by Kanin Kearpimy
      description: >-
        มาทำความรู้จักกับ RAG หรือ Retrieval Augmented Generation
        และการนำไปใช้กับ vector search ใน MongoDB ใน session นี้
        คุณเจมส์จะพาไปสำรวจวิธีการดึงข้อมูลที่เกี่ยวข้องกับคำถามโดยใช้ความหมาย
        มากกว่าการจับคู่แบบตรงตัว เพื่อประสิทธิภาพในการทำงานร่วมกับ Large
        Language Model (LLM) และลดค่าใช้จ่ายในการใช้งาน พร้อมเจาะลึกการทำงานของ
        semantic search และการนำไปใช้ประโยชน์ในการทำ caching ข้อมูลอย่างชาญฉลาด
        เหมาะสำหรับนักพัฒนาที่สนใจเพิ่มประสิทธิภาพการทำงานของแอปพลิเคชันที่ใช้
        LLM


        0:00 | LLM, Vector Search และ Semantic Search คืออะไร?

        0:38 | ภาพรวม Workshop และแหล่งข้อมูลเพิ่มเติม

