video:BridfcJbBvA:
  spec:
    id: BridfcJbBvA
    snippet:
      title: บั้นเด้า | Stupido Hackettino ๙
      description: >-
        พบกับโปรเจกต์พิเศษจากทีมสต๊าฟ
        ที่จะมาสร้างความบันเทิงให้กับทุกคนด้วยเกมเต้นสุดล้ำ โปรเจกต์นี้ใช้ AI
        ถึง 2 ตัวในการทำงาน
        โดยตัวหนึ่งจะทำหน้าที่สร้างจังหวะและแนวเพลงที่หลากหลาย
        ขณะที่อีกตัวจะคอยตรวจจับการเคลื่อนไหวของร่างกาย 2 ส่วนหลัก คือ 'อก' และ
        'ตูด' ของผู้เล่น เพื่อนำมาคำนวณเป็นคะแนนความ 'แซ่บ' ผ่านตัวแปรอย่าง
        'แซ่บ frame' และ 'ไม่แซ่บ frame'
        ความท้าทายของเกมนี้คือผู้เล่นจะต้องเต้นอย่างต่อเนื่อง
        เพราะหากหยุดเต้นเมื่อไหร่ เพลงก็จะหยุดเล่นทันที
        นอกจากนี้ยังสามารถเปลี่ยนแนวเพลงได้ตามใจชอบ ทั้ง K-POP
        หรือเพลงจากประเทศเพื่อนบ้านเพื่อ "รักษาวัฒนธรรม"
        พร้อมทั้งมีการท้าทายให้ผู้กล้ามาเต้นต่อเนื่องกัน 1
        นาทีเพื่อชิงเงินรางวัล
        นับเป็นระบบสร้างความบันเทิงที่ผสมผสานเทคโนโลยีเข้ากับวัฒนธรรมการเต้นได้อย่างวายป่วงและลงตัวที่สุด


