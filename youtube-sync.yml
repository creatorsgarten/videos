        title: >-
          Move fast while maintaining quality with black box testing by Thai
          Pangsakulyanont
        description: >-
          Some systems are hastily built → No automated tests → Code became
          tightly coupled → Code became difficult to test → Want to improve the
          code → Afraid of improving due to fear that it might break because
          there are no automated tests. In this talk, I share some ideas on how
          I try to get out of this loop.


          Notes and references:

          https://dt.in.th/go/bbtt


          0:00 | Introduction

          0:54 | Problems in software development and testing

          1:41 | The importance of Automated Testing

          2:50 | Challenges in doing TDD and unit testing

          5:57 | The approach to software development and testing that I am
          using

          7:02 | Doing black box testing instead of unit testing

          11:01 | Adding testing tools to the application

          12:45 | Example of fixing a bug and covering it with a Black Box Test

          14:28 | Benefits of designing a system in a multi-tenant way

          15:35 | Testing in production

          16:20 | Things to be careful about when writing black box tests

          16:50 | Conclusions


