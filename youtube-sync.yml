video:fSfP6biQbRs:
  spec:
    id: fSfP6biQbRs
    snippet:
      title: Claude Code Discussions
      description: >-
        ช่วงพูดคุยแลกเปลี่ยนประสบการณ์แบบล้อมวงหลังจบการบรรยาย
        ที่รวบรวมเหล่าผู้ใช้งานมาแบ่งปันเทคนิคและมุมมองจากการใช้งานจริง
        ตั้งแต่การตัดสินใจเลือกสมัครสมาชิกแพลนต่างๆ เพื่อความคุ้มค่าของเวลา
        ไปจนถึงการประยุกต์ใช้งานในรูปแบบที่คาดไม่ถึงนอกเหนือจากการเขียนโค้ด เช่น
        การช่วยเขียนนิยาย การจัดการโครงการ
        และการใช้เป็นเครื่องมือช่วยเรียนรู้แบบ active recall
        นอกจากนี้ยังมีการถกเถียงในประเด็นทางเทคนิคและสังคม
        ทั้งเรื่องการบริหารจัดการ token ความโปร่งใสของกระบวนการคิดของ AI
        ตลอดจนผลกระทบด้านพลังงานและสิ่งแวดล้อม
        ปิดท้ายด้วยการวิเคราะห์อนาคตของตลาดแรงงานที่มนุษย์ยังคงต้องมีบทบาทสำคัญในการควบคุมและตรวจสอบความถูกต้องของเทคโนโลยี


        0:00 | เตรียมความพร้อมและเริ่มล้อมวงคุยเรื่อง Claude Code

        1:23 | ทำไมหลายคนถึงยอมจ่าย Claude รายเดือนแพงๆ เพื่อแลกกับเวลา

        3:52 |
        แก้ปัญหาโปรเจกต์งอกด้วยการอัปเกรดแผนการใช้งานเพื่อรองรับงานที่ซับซ้อน

        5:02 | วิธีตรวจสอบจำนวน Token ที่ใช้และการจัดเก็บข้อมูลในเครื่อง

        7:28 | ประเด็นเรื่องความเชื่อมั่นในการคำนวณ Token และแนวคิดตลาดซื้อขาย
        Token มือสอง

        9:03 | เทคนิคการควบคุม AI เพื่อประหยัด Token
        และการใช้โมเดลทางเลือกที่ราคาถูกกว่า

        10:26 |
        ความกังวลเรื่องการใช้พลังงานและผลกระทบต่อสิ่งแวดล้อมจากการรันโมเดล AI

        14:16 | การใช้ Claude ในงานบริหารจัดการโปรเจกต์ การสรุปประชุม
        และงานเอกสาร

        17:32 | ประสบการณ์แปลกใหม่: เมื่อ Claude
        แอบเขียนนิยายผีกระสือให้ในระหว่างทดสอบระบบ

        19:45 | การใช้ Claude เป็น Agent ช่วยประเมินผลและตรวจสอบคุณภาพของ Agent
        ตัวอื่น

        20:42 | เปรียบเทียบการใช้ภาษาไทยและอังกฤษในแง่ของวิธีคิดและค่าใช้จ่าย
        Token

        21:52 | การใช้ AI แก้ปัญหาชีวิตประจำวัน:
        ตั้งแต่แปลตำราโบราณไปจนถึงงานออกแบบและแก้ฟอนต์

        24:47 | ประยุกต์ใช้ AI สร้าง 'Second Brain' และฝึก Active Recall
        จากการอ่านหนังสือ

        26:57 | คำแนะนำสำหรับมือใหม่และการบริหารจัดการ Token ให้คุ้มค่าที่สุด

        28:22 | มุมมองต่ออนาคตของการจ้างงานและบทบาทของมนุษย์ในการตรวจสอบ AI

        30:53 | กล่าวปิดกิจกรรม ขอบคุณทีมงาน และถ่ายรูปร่วมกัน


