    snippet:
      title: >-
        พัฒนาซอฟต์แวร์อย่างรวดเร็ว โดยยังคงคุณภาพ ด้วย Black Box Testing - Thai
        Pangsakulyanont
      description: >-
        สร้างระบบแบบรีบๆ เลยไม่ได้เขียนเทส พอไม่มีเทสโค้ดก็พันกันไปหมด
        พอโค้ดพันกันก็เขียนยูนิตเทสต์ยาก
        พออยากจะปรับปรุงโค้ดก็ไม่กล้าเพราะกลัวพังเพราะไม่มีเทส
        ในหัวข้อนี้เลยอยากแชร์แนวคิดและวิธีที่ผมกำลังทดลองใช้อยู่
        เพื่อพยายามออกจากลูปนี้ (ไม่รู้จะออกได้ไหมนะ)


        Notes and references:

        https://dt.in.th/go/bbtt


