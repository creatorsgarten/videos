    snippet:
      title: Sponsored Session by KBTG - JavaScript Bangkok 1.0.0
      description: >-
        คุณ Nattapon Rattajak, full stack JavaScript developer จาก KBTG
        จะพาคุณไปทำความเข้าใจ React Practice ผ่านการเรียนรู้ functional
        programming ใน JavaScript  การบรรยายนี้จะพูดถึง feature สำคัญๆ ของ
        JavaScript ที่เป็นพื้นฐานของ functional programming เช่น first-class
        function, anonymous function และ closure  พร้อมทั้งอธิบาย key concept
        สำคัญ 5 ประการของ functional programming ได้แก่ pure function, function
        composition, การหลีกเลี่ยง shared state, การหลีกเลี่ยง mutate state
        และการหลีกเลี่ยง side effect  และเรียนรู้วิธีประยุกต์ใช้ concept
        เหล่านี้ในการพัฒนา React application อย่างมีประสิทธิภาพ 
        ไม่ว่าจะเป็นการสร้าง pure component, การจัดการ side effect และการใช้
        immutable data structure  มาร่วมเรียนรู้เทคนิคการเขียนโค้ด React
        ที่สะอาด, เข้าใจง่าย และง่ายต่อการทดสอบ กับคุณณัฐพลในวิดีโอนี้


