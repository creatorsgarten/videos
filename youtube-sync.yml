    snippet:
      title: >-
        Tech Behind the Scene: NETFLIX'S Mad Unicorn ⚡ by Chayapatr
        Archiwaranguprok
      description: >-
        คุณปั๊บ Tech Advisor ของซีรีส์ดังเรื่อง สงคราม ส่งด่วน (Mad Unicorn)
        มาเล่าประสบการณ์เบื้องหลังสุดฮาในการทำงานร่วมกับทีมผู้สร้าง 
        ฟังเรื่องราวการเข้าไปเป็นที่ปรึกษาทางเทคนิคให้กับซีรีส์ 
        ตั้งแต่การสร้างโลกของทีม dev  การออกแบบหน้าจอและโค้ดที่ปรากฏในเรื่อง 
        ไปจนถึงการ workshop ให้นักแสดงที่ไม่มีพื้นฐานด้านเทคมาก่อน 
        รวมถึงเรื่องราวสนุกๆ ในกองถ่าย  และ easter egg
        ที่ซ่อนอยู่ในซีรีส์ที่คุณอาจไม่เคยสังเกต 
        มาร่วมฟังเรื่องราวการทำงานสุดบันเทิงที่ผสมผสานระหว่างโลกของเทคโนโลยีและวงการบันเทิงได้ในวิดีโอนี้


