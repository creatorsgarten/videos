video:QX4WbDuOXE8:
  spec:
    id: QX4WbDuOXE8
    snippet:
      title: A love story written in JavaScript by Ramón Guijarro
      description: >-
        Dating apps can feel tedious and like a waste of time. Is there a way to
        skip the grunt work? That’s what I asked myself six months ago when I
        built Swipr, a tool written in JavaScript that does the swiping for you.
        In this talk we’ll see how it works and how to built CLIs with Node
        along the way.


        0:00 | Introduction and Speaker Intro - Ramón Guijarro from Undefined
        Labs

