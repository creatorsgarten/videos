video:uB_zmx5_gt4:
  spec:
    id: uB_zmx5_gt4
    snippet:
      title: Q&A with Anthropic Team by JB (Don) Lau
      description: >-
        In this session, JB, an engineer from Anthropic’s Claude Code team,
        provides an inside look at the development and practical application of
        agentic coding tools. He discusses the design philosophy behind Claude
        Code, including prompt engineering, safety protocols, and the evolving
        role of "skills" as dynamic prompt libraries. JB addresses the technical
        balance between the underlying model and the software harness, while
        sharing how the team uses the tool to build itself. The discussion
        covers practical strategies for managing large codebases, such as using
        hierarchical context files and leveraging subagents to parallelize
        complex tasks like debugging.


        0:00 | JB's background and role on the Claude Code team at Anthropic

        0:46 | How Anthropic designs Claude Code's personality and safety
        guardrails

        02:47 | Engineering vs. partnerships: directing community sponsorship
        requests

        04:43 | Agent skills: treating prompts like the programming libraries of
        the future

        07:24 | Model vs. Harness: how the AI and the application work together

        09:29 | Recursive development: building Claude Code with Claude Code

        10:52 | Tips for efficiency: using plugins and hierarchical claude.md
        files

        13:23 | Managing context by splitting tasks across multiple Claude
        instances

        15:43 | Planning locally and handing off to the web via the Teleport
        feature

        17:03 | Scaling context with subagents to parallelize large tasks like
        debugging

        20:24 | Closing thoughts: why AI-assisted coding is a vital skill for
        the future


