    snippet:
      title: คนเสพม้า | Stupido Hackettino ๙
      description: >-
        BangBreak - อยากพักสายตางั้นเหรอ BangBreak ช่วยคุณได้ ด้วยการปา
        Flashbangใส่คุณ


        หากคุณเป็นคนหนึ่งที่ทำงานหน้าจอนานเกินไป Extension ตัวนี้พร้อมจะ "ช่วย"
        คุณให้พักสายตาอย่างเด็ดขาด ด้วยการปาแฟลชแบง (Flashbang) ใส่หน้าจอของคุณ!
        โปรแกรมจะบังคับให้คุณพักด้วยการทำให้หน้าจอกะพริบเป็นสีสว่างจ้า
        พร้อมเสียงเตือนที่ชวนให้ตกใจ
        เป็นวิธีถนอมสายตาแนวใหม่ที่รับประกันว่าคุณจะได้พักอย่างแน่นอน...
        ไม่ว่าจะเต็มใจหรือไม่ก็ตาม


