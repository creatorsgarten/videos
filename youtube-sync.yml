video:Diiaj4vOPjE:
  spec:
    id: Diiaj4vOPjE
    snippet:
      title: Type Safe Server to Client by Kongkeit Khunpanitchot
      description: >-
        คุณออม (SaltyAom) ผู้สร้างเฟรมเวิร์ก Elysia
        มาแบ่งปันประสบการณ์และแนวคิดการทำ end-to-end type safety ด้วยภาษา
        TypeScript


        ภายในเซสชันนี้จะมีการพูดถึงข้อจำกัดของการเขียน backend และ frontend
        แบบเดิมๆ รวมถึงปัญหาของเฟรมเวิร์กยุคเก่าที่ไม่สามารถรองรับระบบ type
        ได้อย่างสมบูรณ์ คุณออมจะพาไปทำความรู้จักการใช้ฟีเจอร์และเครื่องมือต่างๆ
        ในการเชื่อมต่อ type อย่างไร้รอยต่อ ตั้งแต่ระดับฐานข้อมูลผ่าน Prisma,
        การตรวจสอบข้อมูลด้วย TypeBox, ไปจนถึงการเรียกใช้งานบนหน้าบ้าน


        นอกจากนี้ยังมีการสาธิตฟีเจอร์การสร้าง API documentation ตามมาตรฐาน
        OpenAPI โดยอัตโนมัติจากการประมวลผล type ในโค้ด
        ซึ่งช่วยลดเวลาการเขียนเอกสารด้วยตัวเอง


        0:00 | แนะนำตัวออม (SaltyAom) ผู้พัฒนาเฟรมเวิร์ก Elysia

        1:15 | tRPC ช่วยเชื่อม Type ข้ามหน้าบ้านและหลังบ้าน ทำให้เห็น Error
        ทันทีเมื่อโค้ดเปลี่ยน

        2:46 | ข้อจำกัดของ tRPC คือไม่ใช่มาตรฐาน REST API และเขียน API Docs
        ได้ยาก

        3:43 | เฟรมเวิร์กยุคเก่าไม่ได้ออกแบบมาเพื่อ TypeScript ทำให้เสริมระบบ
        Type-safe ได้ยาก

        5:21 | Elysia และ Hono คือทางเลือกใหม่ที่รองรับ REST API แบบ End-to-End
        Type Safety

        7:14 | Elysia คำนวณ Type เร็วกว่าและไม่ติดข้อจำกัด 70 Endpoints แบบ Hono

        9:08 | ลองใช้ฟังก์ชัน treaty เพื่อเรียกใช้หลังบ้านจากหน้าบ้านโดยตรงผ่าน
        Type

        11:01 | ตรวจ Validation Data ขาเข้าอัตโนมัติ พร้อมแจ้งเตือน Error
        ทันทีใน IDE

        13:21 | ใช้ ORM อย่าง Prisma หรือ Drizzle เพื่อจัดการ Database แบบ
        Type-safe

        14:56 | แปลง Prisma Schema ให้เป็น TypeBox เพื่อตรวจสอบข้อมูลขาเข้าของ
        API

        16:10 | ลดความน่าเบื่อหน่ายในการเขียน API Docs เองด้วยการเจน OpenAPI

        18:00 | การเขียน Response ใน Docs เองมักมีปัญหาไม่อัปเดตตามโค้ดจริง

        18:59 | ฟีเจอร์เฉพาะของ Elysia: อ่าน TypeScript Type มาเจนเป็น API Docs
        ให้ทำงานแทนคน

        20:38 | เดโม 1: Response ถูกเพิ่มลงใน API Docs
        อัตโนมัติโดยไม่ต้องเขียนอะไรเพิ่ม

        22:44 | เดโม 2: แค่แก้โค้ดเพิ่ม Field ที่หลังบ้าน ตัว API Docs
        ก็จะอัปเดตตามทันที

        24:15 | เดโม 3: การดึง API ไปแสดงผลด้วย React แบบ End-to-end Type Safety

        25:19 | เดโม 4: ทันทีที่แก้ไข Database ตัด Field ทิ้ง
        โค้ดที่เรียกใช้หน้าบ้านจะขึ้นแถบแจ้ง Error ให้เห็นทันที

        27:53 | ประมวลผลสรุปและแจกโค้ดทดลอง พร้อมสถิติการเติบโตปัจจุบันของ
        Elysia


