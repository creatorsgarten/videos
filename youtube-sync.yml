video:QC532-L-6k4:
  spec:
    id: QC532-L-6k4
    snippet:
      title: Intro to Web Assembly by Karn Wong
      description: >-
        มาทำความรู้จักกับ WebAssembly (Wasm)
        เทคโนโลยีใหม่ที่น่าสนใจสำหรับนักพัฒนา  คุณกาน independent consultant
        จะมาแชร์ความรู้เกี่ยวกับ Wasm ตั้งแต่พื้นฐานว่ามันคืออะไร ทำงานอย่างไร
        และข้อดีข้อเสียเป็นอย่างไร  รวมถึงวิธีการนำ Wasm
        มาประยุกต์ใช้กับงานที่เราทำอยู่ทุกวันนี้  โดยเน้นที่ความสามารถในการ
        portability ข้ามแพลตฟอร์ม  ลดขนาดของ binary และ container 
        และการใช้งานจริงในผลิตภัณฑ์อย่าง Google Earth 
        วิดีโอนี้เหมาะสำหรับนักพัฒนาที่ต้องการเรียนรู้เทคโนโลยีใหม่ๆ
        เพื่อเพิ่มประสิทธิภาพในการทำงานและลดต้นทุน  มาร่วมสำรวจศักยภาพของ Wasm
        และวิธีที่มันอาจจะเปลี่ยนแปลงวงการพัฒนาซอฟต์แวร์ไปพร้อมๆ กัน


        00:00 | เริ่มต้นการพูดคุยและแนะนำตัว (Intro & Technical Difficulties)

        00:58 | WebAssembly คืออะไร? (What is WebAssembly?)

        02:41 | ปัญหาโลกแตกของการ Deploy workloads แบบเดิมๆ (Deployment
        Problems)

        05:05 | ข้อดีของ WebAssembly: เบาและรันได้ทุกที่ (Advantages:
        Lightweight & Portable)

        07:51 | WebAssembly vs. Rust/Go: ขนาดไฟล์และประสิทธิภาพ (File Size &
        Performance Comparison)

        09:09 | ข้อดีเพิ่มเติม: Client-side execution และลดค่าใช้จ่าย
        (Client-side & Cost Reduction)

        10:52 | การใช้งาน WebAssembly นอก Browser (WASM Outside Browsers)

        12:53 | WebAssembly กับ IoT (WASM and IoT)

        13:56 | WebAssembly กับ CDN (WASM and CDN)

        15:19 | ตัวอย่างการใช้งานจริงจาก Google Earth (Google Earth Use Case)

        15:58 | WebAssembly กับ Containers (WASM and Containers)

        16:46 | Benchmark: เปรียบเทียบประสิทธิภาพ (Performance Benchmark)

        17:27 | เปรียบเทียบขนาดไฟล์ Binary และ Container (File Size Comparison)

        17:55 | การเรียก WebAssembly จากภาษาอื่นๆ (Calling WASM from Other
        Languages)

        18:34 | ช่วงถาม-ตอบ (Q&A)

        19:30 | คำถามที่ 1: WebAssembly กับ Front-end และ SEO (WASM, Front-end &
        SEO)

        23:01 | คำถามที่ 2: Use Cases และการเลือกใช้ WebAssembly (Use Cases &
        Selection Criteria)

        26:03 | ประกาศผู้โชคดีและปิดท้าย (Winner Announcement & Closing)


