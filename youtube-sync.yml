    snippet:
      title: คนรักสถาบัน | Stupido Hackettino ๙
      description: >-
        Thai Superman voiceover challenge - คือมันดีผมดูไป 2 รอบแต่มันก็สู้ zack
        synder ไม่ได้ แล้วผมจะไปดู zack synder ที่ไหน


        เกมท้าทายความสามารถในการเลียนเสียง ที่จะมาทดสอบ "ความรักสถาบัน"
        ของคุณผ่านการพากย์เสียงฉากหนึ่งจากตัวอย่างภาพยนตร์ซูเปอร์แมนฉบับเสียงภาษาไทย
        ผู้เล่นจะต้องพยายามพูดประโยคตัวอย่างให้เหมือนต้นฉบับมากที่สุด โดยมี AI
        คอยให้คะแนนความเหมือน
        เป็นโปรเจกต์เชิงเสียดสีที่สร้างเสียงหัวเราะด้วยคอนเซ็ปต์ที่เรียบง่ายแต่แฝงไปด้วยความกวน


