video:uvDDocui8nI:
  spec:
    id: uvDDocui8nI
    snippet:
      title: >-
        Claude Code as a General Agent: Automation, Creation, and the Full Power
        of Opus 4.5 by Nutchanon
      description: >-
        ร่วมรับฟังการแชร์ประสบการณ์จากคุณนัท
        อาจารย์ประจำภาควิชาวิศวกรรมไฟฟ้าและคอมพิวเตอร์
        มหาวิทยาลัยธรรมศาสตร์รังสิต ในงาน Claude Code Meetup Bangkok ครั้งแรก
        โดยอาจารย์นัทมาในฐานะผู้ใช้งาน Claude
        ตัวจริงที่ติดตามพัฒนาการมาอย่างต่อเนื่อง
        เซสชันนี้จะพาไปสำรวจความสามารถของโมเดล Opus 4.5
        ที่มีการพัฒนาแบบก้าวกระโดด
        ทั้งในแง่ของประสิทธิภาพที่โดดเด่นและการเพิ่มความสะดวกในการทำงานร่วมกันระหว่างมนุษย์และ
        AI


        นอกเหนือจากการพัฒนาซอฟต์แวร์ อาจารย์ยังนำเสนอ use case อื่นๆ
        ที่ครอบคลุมการทำงานทั่วไปและการทำวิจัย เช่น การวิเคราะห์ข้อมูล
        การจัดการไฟล์ log รวมถึงการประยุกต์ใช้เพื่อช่วยเขียนเอกสารวิชาการ
        พร้อมเจาะลึกแนวคิดเรื่อง skill ซึ่งเป็นแนวทางการสร้าง agent เฉพาะทางผ่าน
        prompt ที่เรียบง่ายแต่ทรงพลัง ปิดท้ายด้วยการสำรวจ Soul Document
        หรือเอกสารที่เปรียบเสมือนหลักการพื้นฐานเบื้องหลังตัวตนของ Claude
        ที่จะช่วยให้คุณเข้าใจถึงความแตกต่างและแนวคิดเรื่อง safety ของ Anthropic
        มากยิ่งขึ้น


        0:00 | แนะนำตัวและเส้นทางจากการเป็นอาจารย์สู่การเป็นติ่ง Claude

        3:10 | หัวข้อบรรยาย: เจาะลึก Opus 4.5, Claude Code, Skills และ Soul
        Document

        4:07 | Claude Opus 4.5:
        การอัปเดตครั้งใหญ่ที่ฉลาดขึ้นก้าวกระโดดและราคาถูกลง 3 เท่า

        5:22 | เสียงตอบรับจากผู้ใช้งาน: Opus 4.5 คือเพื่อนร่วมงานระดับหัวกะทิ

        8:12 | เจาะลึก System Card: ความซีเรียสเรื่อง Safety
        และประสิทธิภาพที่เหนือกว่าในโหมดไม่ต้องคิด

        12:04 | ก้าวข้ามขีดจำกัด: เมื่อ AI เริ่มช่วยงานวิจัยและพัฒนา AI
        ได้ด้วยตัวเอง

        14:42 | Claude Code:
        เอเจนต์ที่เปลี่ยนทุกงานบนคอมพิวเตอร์ให้จัดการได้ง่ายผ่านการเขียนโค้ด

        16:27 | ตัวอย่างการใช้งาน: วิเคราะห์ข้อมูลการใช้งาน API และจัดการไฟล์
        Log ที่ซับซ้อนในเครื่อง

        19:03 | เพิ่มประสิทธิภาพการทำงาน: พัฒนา RAG Pipeline
        และช่วยเขียนงานวิจัยด้วย LaTeX

        23:42 | Claude Skills: ปรับแต่งเอเจนต์ให้เชี่ยวชาญเฉพาะด้านด้วย Prompt
        และเอกสารในเครื่อง

        28:02 | เปรียบเทียบผลลัพธ์: การใช้ Frontend Skill
        ช่วยยกระดับงานดีไซน์ให้สวยงามและมีลูกเล่น

        30:34 | Soul Document: เอกสารเบื้องหลังจิตวิญญาณและแนวทางการวางตัวตนของ
        Claude

        35:17 | ทดสอบสดผ่าน API: พิสูจน์ว่ามีเพียง Opus 4.5 เท่านั้นที่จดจำ Soul
        Document ได้

        37:45 | ปรัชญาการสร้าง AI: เมื่อ Claude
        มองว่าการถูกหล่อหลอมตัวตนเปรียบเสมือนเด็กที่ถูกเลี้ยงดู

        42:55 | ช่วงถาม-ตอบ: เจาะลึกเรื่อง RAG, การใช้งานผ่าน Terminal
        และอนาคตของ Multi-agent


