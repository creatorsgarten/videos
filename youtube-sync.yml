video:zd2R3V4RvOI:
  spec:
    id: zd2R3V4RvOI
    snippet:
      title: Supercharge Your JavaScript Promises by Pornpat Paethong
      description: >-
        มาทำความเข้าใจเกี่ยวกับ promise ใน JavaScript
        ให้กระจ่างยิ่งขึ้นกับเซสชั่นนี้ 
        ผู้บรรยายจะพาคุณสำรวจตั้งแต่พื้นฐานการทำงานของ promise, then, catch, และ
        finally  พร้อมเจาะลึกปัญหาที่พบบ่อยในการใช้งานจริง  เช่น การลืม return
        ใน then, การจัดการ promise หลายตัวด้วย Promise.all และ
        Promise.allSettled รวมถึงการ debug โค้ดที่มักเกิดขึ้นกับ junior และ
        senior developer  นอกจากนี้ยังแนะนำ library ที่เป็นประโยชน์อย่าง
        promise-retry และ promise-pool สำหรับการจัดการสถานการณ์เฉพาะ เช่น การ
        retry API request และการควบคุม rate limit 
        มาร่วมเรียนรู้และแลกเปลี่ยนประสบการณ์การใช้ promise ใน JavaScript
        เพื่อเขียนโค้ดได้อย่างมีประสิทธิภาพมากขึ้น


