video:QHZBtd2Bt6U:
  spec:
    id: QHZBtd2Bt6U
    snippet:
      title: >-
        ผลกระทบของ AI ต่อสังคมและเศรษฐกิจ: 3 เรื่องเล่าชวนคิด - Chayapatr
        Archiwaranguprok
      description: >-
        ในหัวข้อนี้ คุณปั๊บนำเสนอมุมมองที่น่าสนใจเกี่ยวกับผลกระทบของเทคโนโลยีและ
        AI ต่อสังคมและเศรษฐกิจเริ่มด้วยการพูดถึงความยากในการคาดการณ์อนาคต
        โดยยกตัวอย่างคำทำนายที่ผิดพลาดเกี่ยวกับอินเทอร์เน็ตและ Bitcoin
        คุณปั๊บนำเสนอเรื่องราว 3 เรื่องที่สะท้อนมุมมองต่างๆ
        เกี่ยวกับการเปลี่ยนแปลงทางเทคโนโลยี ได้แก่ กลุ่ม Luddite ภาพยนตร์เรื่อง
        Terminator และการ์ตูนเว็บตูน Clinic of Horrors
        และตั้งคำถามที่น่าคิดเกี่ยวกับอนาคตของงานและคุณค่าของมนุษย์ในยุค AI
        วิดีโอนี้จะทำให้คุณได้มุมมองใหม่ๆ
        ในการมองโลกที่กำลังเปลี่ยนแปลงอย่างรวดเร็ว


        0:00 | บทนำและการทักทาย

        0:07 | คำทำนายที่ผิดพลาดเกี่ยวกับเทคโนโลยี

        0:58 | บทเรียนจากคำทำนาย: อย่าเชื่อทั้งหมด

        1:15 | ความยากลำบากในการทำนายอนาคต

        2:00 | เรื่องเล่า 3 เรื่อง: Luddites, Terminator และ ต้นไม้แห่งเงิน

        2:56 | บทบาทของ Luddites และความกลัวต่อเทคโนโลยี

        3:14 | Terminator: ภาพสะท้อนของความกลัว AI

        3:45 | ต้นไม้แห่งเงิน: คุณค่าของมนุษย์ในโลกที่ AI ครอง

        4:22 | การวิเคราะห์ 3 เรื่องเล่า

        5:45 | งานในศตวรรษที่ 21 เปรียบเสมือนศาสนา

        6:50 | การตัดสินคุณค่าของมนุษย์ในอนาคต

        7:17 | คำถามสำคัญ: AI แย่งงานมนุษย์ หมายความว่าอย่างไร?

        7:47 | ผลกระทบของ AI ต่อสังคมและเศรษฐกิจ

        8:09 | สรุปและบทส่งท้าย


