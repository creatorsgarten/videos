video:TJ54j3Dk5WA:
  spec:
    id: TJ54j3Dk5WA
    snippet:
      title: Better testing with Vue application by Somkiat Puisungnoen
      description: >-
        คุณปุ๋ย หรือคุณสมเกียรติ จะมาแชร์ประสบการณ์และมุมมองเกี่ยวกับการทดสอบ
        (test) ใน Vue.js และ Nuxt.js 
        พบกับเรื่องราวความสนุกปนขมขื่นของชีวิตนักพัฒนาที่ต้องเผชิญกับ deadline
        และ bug  คุณปุ๋ยจะชวนคิดถึงปัญหาที่มักเกิดขึ้นในการพัฒนาซอฟต์แวร์  เช่น
        การ refactor โค้ด การจัดการ environment  และความสำคัญของการ test 
        พร้อมทั้งนำเสนอแนวคิดและเทคนิคการ test  เช่น end-to-end test, isolated
        test และการ mock  รวมถึงการใช้เครื่องมืออย่าง Vitest, Playwright และ
        Cypress  มาเรียนรู้วิธีสร้างความเชื่อมั่นในโค้ด 
        และเตรียมรับมือกับการเปลี่ยนแปลงในโลกของการพัฒนาซอฟต์แวร์ไปพร้อมกัน


