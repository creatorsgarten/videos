video:ZuYHhWydI6M:
  spec:
    id: ZuYHhWydI6M
    snippet:
      title: Open the Claw by Poramate Minsiri
      description: >-
        จุดเริ่มต้นของ OpenClaw คืออะไร? ทำไมทุกคนถึงต้องจับตามอง! 🚀
        มาร่วมเปิดโลกทัศน์และเจาะลึกวิสัยทัศน์ของเทคโนโลยีที่จะเข้ามาเปลี่ยนอนาคต
        กับคุณปรเมศวร์ มินศิริ (พี่เอ๋อ) คลิปนี้จะเป็นก้าวแรกที่พาคุณไปรู้จักกับ
        "กรงเล็บ" ที่จะพลิกโฉมวงการ!


        0:00 | บทนำและทำความรู้จักกับหัวข้อ 'แกะกุ้ง' (OpenClaw)

        0:28 | OpenClaw คืออะไร: Gateway สำหรับเชื่อมต่อแอปแชทกับ AI Coding
        Agent

        1:06 | กลุ่มเป้าหมาย: เหมาะสำหรับ Developer และ Power User
        ที่ดูแลระบบเองได้

        1:57 | ไดอะแกรมการทำงาน: OpenClaw ทำหน้าที่เป็นศูนย์กลางเชื่อมต่อแชทและ
        Agent

        2:42 | เทคนิคการกู้คืนระบบ: ใช้ Rescue Bot หรือ CLI อื่นๆ
        ช่วยซ่อมเมื่อระบบมีปัญหา

        5:01 | โปรโตคอล ACP: แนวคิด Bring Your Own Agent (BYOA) เลือกใช้ AI
        ค่ายไหนก็ได้

        6:32 | การกำหนดพฤติกรรม Agent ผ่านไฟล์ AGENTS.md, IDENTITY.md และ
        USER.md

        8:22 | การจัดการความจำ (Memory) และเทคนิคการใช้ Obsidian เพื่อประหยัด
        Token

        10:32 | การเพิ่ม Skill เฉพาะทาง และการตั้งค่าทำงานอัตโนมัติด้วย
        Heartbeat (Cron job)

        11:54 | การทำ Multi-agent ด้วย OpenProse เพื่อสั่งงาน AI
        หลายตัวให้ทำงานพร้อมกัน


