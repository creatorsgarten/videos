  spec:
    id: 4ePm0u8Z5H0
    snippet:
      title: If your answer is yes, by Nuntinee Tan
      description: >-
        Description: A participatory performance in which each participant is a
        single data point, physically embodying their values.


        00:00 | แนะนำตัวและเกริ่นนำถึง Performance ที่เกี่ยวกับ Data และ
        Algorithm

        00:42 | แนะนำ Walking Mass: Participatory Performance โดย NUUM
        Collective

        01:11 | เริ่มต้น Performance: หาอาสาสมัคร 10 คน

        01:41 | Warm-up: จัดเรียงอาสาสมัครตามคุณสมบัติต่างๆ

        02:29 | Warm-up: หาจุดยืนที่สบายที่สุด

        03:01 | Warm-up: เรียงลำดับตามความสูง, ขนาดเท้า, ความยาวนิ้วก้อย, อายุ,
        ความเหนื่อย, ความสุข, ความเฟรนด์ลี่, การ Expressive และความงง

        06:28 | เดินอย่างอิสระในพื้นที่ และสังเกตสิ่งรอบข้าง

        07:00 | ยืนเรียงแถวหน้าชั้นหนังสือ และตอบคำถาม Yes/No ด้วยการก้าวเดิน

        07:53 | คำถาม Yes/No ชุดที่ 1: คุณสมบัติส่วนตัว และความชอบ

        08:51 | คำถาม Yes/No ชุดที่ 2: จำนวนรูจมูก และจำนวนชีวิต

        09:15 | คำถาม Yes/No ชุดที่ 3: คำถามเชิงปรัชญาเกี่ยวกับ Freedom, ความดี,
        อนาคต และความตาย

        12:51 | เดินอย่างอิสระอีกครั้ง: ใช้ Freedom อย่างไร?

        14:03 | พูดคุยและแลกเปลี่ยนความรู้สึกหลังจบ Performance

        15:23 | พูดคุยถึงความรู้สึกในการเรียงแถว และการประเมินตนเองกับผู้อื่น

        16:09 | เปรียบเทียบความรู้สึกจากคำถามช่วงต้นและช่วงท้าย

        17:00 | อธิบายธีมของ Performance: Physical Features, การตัดสินส่วนบุคคล,
        Self-Awareness, และ Embodiment

        18:03 | อธิบาย Algorithm ที่ใช้: Sorting และ Conditional Statement

        18:17 | มนุษย์ทำให้ Data ซับซ้อน: Data เป็นตัวเลข vs.
        ความรู้สึกผ่านร่างกาย

        19:03 | สรุป: หาจุดสมดุลระหว่างภาพใหญ่ของ Data และน้ำหนักของแต่ละ Data
        Point

        19:40 | ช่วงแนะนำช่องทางติดต่อ และขอบคุณผู้ชม

        20:01 | Q&A: ความซับซ้อนของมนุษย์กับ Algorithm ที่เรียบง่าย

