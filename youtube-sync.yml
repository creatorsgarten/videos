video:YbfI2Nx2pYg:
  spec:
    id: YbfI2Nx2pYg
    snippet:
      title: >-
        Conversation(s) with Claude: ค้นพบฉันคนใหม่ในฉันคนเดิม by Thananon Korr
        Ngoenthaworn
      description: >-
        คุณก่อ โปรแกรมเมอร์ที่มีประสบการณ์ในสายงานมานานกว่า 15 ปี
        มาบอกเล่าเทคนิคการใช้งาน AI ให้มีประสิทธิภาพสูงสุดในงบประมาณที่จำกัด
        โดยเริ่มจากการแบ่งปันประสบการณ์การเฟ้นหา AI ทางเลือกอย่าง GLM หรือ
        MiniMax เพื่อนำมาใช้งานทดแทนโมเดลหลักที่มีค่าใช้จ่ายสูง
        พร้อมแนะนำเครื่องมือเสริมที่น่าสนใจอย่าง claude-mem
        ซึ่งช่วยแก้ปัญหาเรื่องข้อจำกัดด้านความจำของ AI
        ในการจัดการกับโค้ดหรือไฟล์งานที่มีความยาวมาก ๆ
        นอกจากนี้เขายังนำเสนอแนวคิดการประยุกต์ใช้ AI ในด้านอื่น ๆ เช่น
        การสร้างโมเดล 3D สำหรับพัฒนาเกม และการนำข้อมูลทางโหราศาสตร์อย่าง birth
        chart มาช่วยปรับแต่ง system prompt เพื่อให้ AI
        เข้าใจบริบทและตัวตนของผู้ใช้งานได้ดียิ่งขึ้น
        พร้อมโชว์ผลลัพธ์จากโปรเจกต์จริงที่พัฒนาขึ้นด้วยเครื่องมือเหล่านี้
        เพื่อเป็นแรงบันดาลใจให้นักพัฒนานำไปปรับใช้กับงานของตนเองอย่างสร้างสรรค์


        0:00 | แนะนำตัวและจุดเริ่มต้นของการเป็นโปรแกรมเมอร์ตลอด 15 ปี

        1:17 | การตั้งคำถามถึงความคุ้มค่าของการจ่ายค่าบริการ Claude ในราคาสูง

        2:11 | การใช้ GLM และ MiniMax
        เป็นทางเลือกเพื่อลดต้นทุนและเพิ่มประสิทธิภาพงาน

        3:11 | เทคนิคการหลอก Claude CLI และการใช้ claude-mem เพื่อแก้ปัญหา AI
        ลืมบริบท

        4:54 | การใช้ AI ช่วยสร้าง Model 3D สำหรับเกม
        ซึ่งช่วยลดเวลาการทำงานได้ถึง 80%

        5:26 | แนวคิดการใช้ Birth Chart เป็น System Prompt เพื่อให้ AI
        เข้าใจตัวตนเราอย่างลึกซึ้ง

        6:27 | โชว์ผลงานจริงที่สร้างด้วย AI: HyperJournal, Moro.exchange
        และแอปแปลง 2D เป็น 3D


