video:ngJFbMEyKMo:
  spec:
    id: ngJFbMEyKMo
    snippet:
      title: How to Keep Up with AI by Veha Suwatphisankij
      description: >-
        คุณเวหา software engineer และผู้สอนที่มีประสบการณ์
        แบ่งปันมุมมองเกี่ยวกับการติดตามความเคลื่อนไหวของ AI
        ที่เปลี่ยนแปลงอย่างรวดเร็วในงาน Claude Code Meetup
        โดยเริ่มต้นจากการทำความเข้าใจแนวคิดเรื่อง scaling law
        ซึ่งส่งผลให้ความฉลาดของโมเดลเพิ่มขึ้นในขณะที่ราคาถูกลงอย่างต่อเนื่อง
        เนื้อหาครอบคลุมถึงการเปรียบเทียบประสิทธิภาพของโมเดลรุ่นใหม่ๆ อย่าง
        Gemini 3 Flash และ o3-preview ผ่านการใช้ evaluation
        หรือเครื่องมือวัดผลรูปแบบต่างๆ
        เพื่อช่วยในการตัดสินใจเลือกโมเดลให้เหมาะสมกับโจทย์การทำงานจริง
        นอกจากนี้ยังมีการวิเคราะห์ถึงข้อจำกัดของระบบจัดอันดับยอดนิยมอย่าง LM
        Arena
        และความสำคัญของการสร้างชุดทดสอบส่วนตัวเพื่อประเมินผลลัพธ์ให้ตรงกับความต้องการของแต่ละโปรเจกต์


        0:00 | แนะนำตัวและแนวทางการตามข่าว AI ในยุคที่โมเดลใหม่มาทุกสัปดาห์

        1:08 | บทเรียนจากราคาอลูมิเนียม: เมื่อเทคโนโลยีทำให้ของแพงกลายเป็นของถูก

        3:08 | Scaling Law: กฎที่ทำให้ AI ฉลาดขึ้น ถูกลง และมั่วน้อยลง

        4:36 | Intelligence too cheap to meter: ความฉลาดที่ราคาถูกลงอย่างมหาศาล

        7:40 | อย่าดูแค่ชื่อโมเดล แต่ให้ดู Evaluation ที่เหมาะสมกับงานเรา

        9:42 | ข้อควรระวังของ LM Arena:
        ความพึงพอใจของคนอาจไม่ใช่ความฉลาดที่แท้จริง

        11:15 | ตัวอย่าง Eval เฉพาะทาง: ตั้งแต่การคุมหน้าจอ UI
        ไปจนถึงข้อสอบภาษาไทย

        13:50 | วิธีเลือกโมเดลและ Harness
        ให้เหมาะกับงานโปรแกรมมิ่งและบริบทที่ยาวมาก

        14:28 | บทสรุป: สร้าง Evaluation ของตัวเองเพื่อวัดผลปัญหาที่เราเจอจริงๆ


