video:hBBZniEMGz0:
  spec:
    id: hBBZniEMGz0
    snippet:
      title: Vibe Coding โดยไม่ทิ้ง Tech Debt เอาไว้ข้างหลัง by Thada Wangthammang
      description: >-
        พบกับคุณธาดา (มาย) DevOps lead และแอดมินเพจ ThaiType
        ที่จะมาแบ่งปันประสบการณ์การเขียนโค้ดร่วมกับ AI ว่า vibe code
        อย่างไรให้รอดพ้นจากปัญหา technical debt และภาวะสมองล้า (brain fatigue)
        จากการตัดสินใจต่างๆ ที่มากเกินไป


        เซสชันนี้จะพาไปเจาะลึกแนวคิดสามเหลี่ยมระหว่าง คน กฎ และ AI
        โดยเน้นความสำคัญของการวาง template การทำงานที่ชัดเจน การประยุกต์ใช้
        Clean Architecture ในการแบ่งเลเยอร์ซอฟต์แวร์ รวมถึงการบังคับใช้
        end-to-end type safety ใน TypeScript
        ซึ่งช่วยให้โค้ดแต่ละส่วนไม่ผูกติดกัน
        ในขณะที่ยังตรวจสอบได้ว่าทุกอย่างสอดคล้องกันอยู่
        นอกจากนี้ยังมีการแนะนำแนวคิดของ chief agent
        ที่เข้ามาช่วยสกรีนและรับภาระด้านการออกแบบแทนนักพัฒนา


        0:00 | แนะนำตัว: จบโปรเจกต์ใน 3 สัปดาห์ด้วยการใช้ AI เขียนโค้ด 99.99%

        1:48 | ทำไม Vibe Code ถึงพัง? เพราะงานเร่งสร้าง Tech Debt
        และเปลี่ยนเป็นความเหนื่อยล้าทางกลยุทธ์ (Strategic Fatigue)

        4:24 | เลิกคิดว่า 'เดี๋ยวค่อย Refactor' เพราะมันไม่มีอยู่จริง ต้องแก้
        Tech Debt และปรับโครงสร้างทันที

        6:53 | สามเหลี่ยม 'คน-กฎ-AI':
        ลดภาระในสมองด้วยการโยนการตัดสินใจไปที่การตั้ง Rule

        8:19 | AI มักตกม้าตายเรื่อง TypeScript การมี Template
        กฎเหล็กจึงสำคัญที่สุดในการควบคุมทิศทาง

        10:37 | แยกแยะ Value-level กับ Type-level ใน TypeScript
        เพื่อประกบและขึ้นโครงให้ AI เดินต่อได้

        12:08 | รักษา Clean Architecture โดยการแยก Type ของรหัสโดเมน
        ไม่ให้ผูกติดตายตัวกับ Validator อย่าง Zod

        14:41 | เทคนิคการสร้างฟังก์ชัน Match เพื่อรับประกันว่า Type ขั้น
        Interface และ Schema ตรงกันเสมอ

        17:04 | ป้องกันการรั่วไหลของ Type Database (เช่น Object ID)
        สู่เลเยอร์ออฟฟิศด้วย Auto-conversion ที่ชั้น Zod

        18:11 | เจาะโครงสร้าง End-to-End Type Safety ข้ามเลเยอร์
        เมื่อเปลี่ยนจุดเดียว จุดอื่นต้องพังเพื่อส่งสัญญาณ

        19:53 | บังคับเช็ค Lint และ Type ในการรันทุก Iteration เพื่อสร้าง
        Feedback Loop ที่ตอบสนองไวที่สุด

        21:56 | ปลดล็อกความล้าสมองด้วย 'Chief Agent':
        สั่งให้หยุดแล้วเสนอทางเลือกเมื่อ AI เจอจุดคลุมเครือขัดแย้ง

        24:37 | ใช้ Sub-Agent ดักจับการพัง (Negative Progress) และเทคนิค Grill
        Me เพื่อจัดระเบียบความคิดคนให้ตรงกับ AI

        26:26 | สรุป 3 แกนหลักของ AI Engineering (คน-กฎ-AI)
        และฝากผลงานโปรเจกต์ท้ายคลิป


        --------------------------------------------

