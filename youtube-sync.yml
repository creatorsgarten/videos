video:Leqp7_6wRXs:
  spec:
    id: Leqp7_6wRXs
    snippet:
      title: >-
        Build AI Agents with Agent Development Kit (ADK) and Gemini using
        JavaScript by Punsiri Boonyakiat
      description: >-
        คุณบีท ปุณณ์สิริ บุณยเกียรติ Google Developer Expert และ LINE API Expert
        จะพาคุณไปรู้จักกับการสร้าง AI agent ด้วย JavaScript และ TypeScript
        ผ่านเครื่องมือ Agent Development Kit (ADK) จาก Google


        เซสชันนี้จะแสดงให้เห็นว่านักพัฒนาสาย web ไม่จำเป็นต้องพึ่งพาเพียงแค่ภาษา
        Python ในการสร้าง AI agent อีกต่อไป โดยเนื้อหาจะครอบคลุมตั้งแต่การจำลอง
        environment บน GitHub Codespaces การใช้งานโมเดลภาษา Gemini
        การกำหนดบทบาทของตัว agent ตลอดจนการเชื่อมต่อ tool ต่างๆ
        เพื่อเพิ่มความแม่นยำในการทำงาน เช่น ทำงานร่วมกับ Google Search
        และการดึงข้อมูลที่พักจาก Airbnb ผ่าน MCPToolset
        และยังครอบคลุมไปถึงการสาธิตวิธีเรียกใช้งาน agent ผ่าน REST API
        เพื่อให้นำไปปลั๊กเข้ากับแพลตฟอร์มต่างๆ ได้ง่ายขึ้น


        0:00 | แนะนำเครื่องมือ Agent Development Kit (ADK) เปลี่ยนทุกคนให้สร้าง
        AI Agent ได้

        1:11 | 4 ขั้นตอนหลักของการสร้าง AI: ใช้ JavaScript
        เชื่อมต่อได้ทุกแอปพลิเคชัน

        2:02 | องค์ประกอบของ AI Agent: โมเดลภาษา (LLM), เครื่องมือทำงาน (Tools),
        และคำสั่ง (Instruction)

        3:03 | ADK เป็น Framework แบบครบวงจร: ครอบคลุมตั้งแต่การสร้าง, Debug
        ไปจนถึง Deploy

        4:01 | สายงาน JS/TS เข้าถึงง่ายขึ้น: ไม่จำเป็นต้องพึ่งพาแค่ภาษา Python
        เสมอไป

        5:08 | เขียนโค้ดได้ทันทีไม่ต้องจำลอง Environment ด้วยเว็บคลิกเดียวอย่าง
        GitHub Codespaces

        6:28 | เริ่มต้นสร้างโปรเจกต์ด้วยการโหลดไลบรารีผ่านคำสั่ง npx
        @google/adk-devtools

        9:07 | คอนฟิกตั้งค่าก่อนรัน: เลือกโมเดล Gemini 2.5 และตั้งค่า
        GEMINI_API_KEY

        11:22 | สำรวจโค้ดที่สร้างอัตโนมัติ: การกำหนดบทบาทของ AI ลำดับขั้นตอนผ่าน
        instruction

        12:55 | ตรวจสอบการทำงานและรันแชตแอปพลิเคชันจำลองด้วยสคริปต์ npm run web

        15:02 | ทดสอบจำลองตอบคำถาม: กฎเหล็กคือถ้าเครื่องมือ (Tool) ไม่ดี AI
        ก็จะให้คำตอบที่ไม่ดีตามไปด้วย

        17:33 | อัปเกรดระบบเพื่ออุดช่องโหว่: แทนที่ฟังก์ชันแบบ Dummy ด้วย
        GOOGLE_SEARCH เพื่อดึงข้อมูลจริง

        19:40 | ทดสอบหลังการอัปเดต: สังเกตกระบวนการทำงานเมื่อ AI
        ควานหาความจริงเรื่องข่าวน้ำมัน

        20:54 | ดึงข้อมูลจากแพลตฟอร์มภายนอก: การต่อ MCPToolset ร่วมกับ Service
        นอกอย่าง Airbnb

        22:34 | เปลี่ยน Persona ใหม่:
        ปรับแก้โค้ดและคำสั่งให้กลายเป็นผู้ช่วยค้นหาที่พักเต็มรูปแบบ

        23:34 | สรุปผลลัพธ์ของ MCP Tool: AI
        สามารถลิสต์ที่พักน่าสนใจในสิงคโปร์พร้อมสรุปราคาได้

        25:18 | ความสามารถด้าน REST API: สามารถนำ Endpoint ไปใช้ผ่าน curl หรือ
        Postman ได้เลย

        28:23 | บทส่งท้าย: เมื่อเทคโนโลยีพุ่งไปข้างหน้า
        เราต้องพยายามวิ่งให้ทันและไม่หยุดเรียนรู้


