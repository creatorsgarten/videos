video:Q3dgS5KFfHk:
  spec:
    id: Q3dgS5KFfHk
    snippet:
      title: 'Sparking Curiosity: The Power of Creative Coding by Patt Vira'
      description: >-
        In an age where technology is deeply intertwined with creativity,
        teaching coding has become much more than just learning a technical
        skill—it's about fostering a mindset of exploration, innovation, and
        artistic expression. This talk delves into the transformative potential
        of creative coding in education, highlighting how it can be a powerful
