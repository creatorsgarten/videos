video:MWllwllnEPc:
  spec:
    id: MWllwllnEPc
    snippet:
      title: Thailand Developer Survey 2024 by Kamolphan Liwprasert
      description: >-
        มาดูผลสำรวจ Thailand Web Developer 2024 กันว่า developer
        ไทยส่วนใหญ่ใช้เทคโนโลยีอะไรกันบ้าง พบกับฟนจาก Women Techmakers
        ที่จะมาเปิดเผยข้อมูลเชิงลึกจากผลตอบรับกว่า 274 คน
        ครอบคลุมตั้งแต่ข้อมูลประชากรศาสตร์ เพศ อายุ รายได้ ไปจนถึงเทคโนโลยี
        frontend และ backend ยอดนิยม ไม่ว่าจะเป็น React, TypeScript, Vite,
        PostgreSQL และอื่นๆ อีกมากมาย
        รวมถึงมุมมองเกี่ยวกับความพึงพอใจในอาชีพและปัจจัยในการเลือกงาน
