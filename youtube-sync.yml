video:gJqvzfRhzNc:
  spec:
    id: gJqvzfRhzNc
    snippet:
      title: >-
        Mastering Phi-3 Experiments: Innovative Approaches with JavaScript &
        Ollama by Charunthon Limseelo
      description: >-
        Join us for an immersive session where we dive deep into the world of
        Phi-3 experiments, leveraging the power of JavaScript and the versatile
        Ollama platform. Whether you're a seasoned developer or a curious
        newcomer, this workshop is designed to equip you with the knowledge and
        skills needed to create cutting-edge applications and AI-driven
        solutions. In this session, participants will learn about the latest
        advancements in JavaScript with "Bun" and how they can be applied to
        Phi-3 experiments, as well as explore the potential of the Ollama
        platform to enhance Phi-3 projects with state-of-the-art AI models as
        running locally on device. In this session, I will guide you through
        hands-on projects, enabling you to build practical skills and reinforce
        your learning. From networking with fellow enthusiasts to staying
        updated on the latest trends, this workshop offers a comprehensive
        experience tailored for anyone looking to advance their knowledge in the
