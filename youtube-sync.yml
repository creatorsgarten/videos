      title: >-
        Data Architecture ในงาน Data Engineer ใครก็เริ่มได้ ไม่ต้องเป็น Senior
        by Kan Ouivirach
      description: >-
        พบกับคุณกานต์จาก ODDS-TEAM หรือ ODT ในหัวข้อ "Data Architecture ในงานของ
        Data Engineer" ไม่ว่าคุณจะเป็น data engineer มือใหม่หรือรุ่นพี่
        เซสชั่นนี้จะพาคุณไปสำรวจปัญหาและความท้าทายในการออกแบบ data architecture
        พร้อมเจาะลึกแนวคิดและเทคนิคที่สามารถนำไปประยุกต์ใช้ได้จริง
        โดยคุณกานต์จะแชร์ประสบการณ์และวิธีการทำงาน เช่น Residuality Theory, C4
        model และ ADR เพื่อช่วยให้คุณเข้าใจและออกแบบ data architecture
        ได้อย่างมีประสิทธิภาพมากขึ้น มาร่วมเรียนรู้และพัฒนาทักษะ data
        architecture ไปพร้อมๆ กัน


