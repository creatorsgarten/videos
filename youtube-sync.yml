        12:45 | ตัวอย่างการแก้ไข bug ด้วย black box testing

        14:28 | ประโยชน์ของการออกแบบระบบแบบ multi-tenant

        15:35 | แนวคิดเรื่อง testing in production

        16:20 | ข้อควรระวังในการเขียน black box test

        16:50 | สรุปและข้อแนะนำสุดท้าย


