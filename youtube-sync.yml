video:6G_ajEBUEZ8:
  spec:
    id: 6G_ajEBUEZ8
    snippet:
      title: Reversing the Claw by Dom Charoenyos
      description: >-
        ผ่าตัด แงะ แกะเกา! 🛠️ ชำแหละเบื้องหลังการทำงานของ OpenClaw
        โดยลองนำมาเชื่อมต่อระบบ Payment เพื่อตัดเงินผ่าน wallet
        ล้วงลึกเจาะกลไกการทำงานกับคุณโดม เจริญยศ (Dom Charoenyos) สาย Deep Tech,
        Web3 และ Security เตรียมตัวให้พร้อม แล้วมาแกะรอยกรงเล็บนี้ไปด้วยกัน!


        0:00 | จุดเริ่มต้น: ข้อจำกัดของ AI ผู้ช่วยส่วนตัวกับงานสาย Blockchain

        1:41 | แนวคิด Reverse Claw: เปลี่ยน AI ให้เป็น 'พ่อค้า'
        เปิดรับคำสั่งซื้อจากลูกค้าสาธารณะ

        4:07 | ตามหาเครื่องมือที่เหมาะสม: สาเหตุที่เลือกใช้ PicoClaw (ภาษา Go)
        แทนการใช้โปรเจกต์ภาษา Rust

        5:25 | ทำไมต้องภาษา Go?: เพราะรองรับ `go-ethereum` สามารถสร้าง Hot
        Wallet เพื่อรับชำระเงิน On-chain ได้ทันที

        6:46 | กฎความปลอดภัยของ Hot Wallet:
        ป้องกันเงินหายด้วยการตั้งโอนอัตโนมัติเข้า Hardware Wallet เสมอ

        8:29 | การรับชำระเงินแบบ Fiat: ต้องมี Proxy คั่น Webhook
        เสมอเพื่อป้องกันแฮกเกอร์ส่งคำสั่งหลอกระบบ

        11:24 | การจัดสิทธิ์ใน Telegram: แยกระดับสิทธิการเข้าถึงของลูกค้า ทีมงาน
        (อ่านอย่างเดียว) และผู้ดูแลระบบ

        13:49 | เป้าหมายธุรกิจ: เดโมการโอนเหรียญ และแผนการใช้งาน Merchant Claw
        ร่วมกับ JFIN Chain ในอนาคต


