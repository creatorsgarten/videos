        Phoomparin Mano
      description: >-
        ใน Session นี้ ภูมิ Software Engineer จาก Metabase และผู้จัดงานในไทย
        ชวนตั้งคำถามและสำรวจความกังวลเรื่อง AI จะมาแทนที่งานของมนุษย์
        โดยเปรียบเทียบกับ Hype Cycle ของเทคโนโลยีต่างๆ ในอดีต เช่น dot-com
        bubble และ crypto ภูมิอธิบายถึงธรรมชาติและข้อจำกัดของ AI
        พร้อมยกตัวอย่างงานวิจัยที่ช่วยให้เข้าใจการทำงานของ AI มากขึ้น Session
        นี้เหมาะสำหรับผู้ที่สนใจผลกระทบของ AI ต่อตลาดแรงงาน
        และต้องการเข้าใจความเป็นไปได้และข้อจำกัดของ AI ในปัจจุบัน


