video:_MvyFM7ATUY:
  spec:
    id: _MvyFM7ATUY
    snippet:
      title: >-
        Write Less, Achieve More: How to build a living document with Cucumber
        JS and PACT by Supat
      description: >-
        This session explores strategies for writing robust and efficient
        end-to-end tests, focusing on stability and speed.  The speaker delves
        into the challenges of traditional unit testing and proposes an
        alternative approach using Cucumber and Gherkin to define system
        environments and preconditions.  The talk demonstrates how to leverage
        Pact to mock entire servers, ensuring reliable and predictable test
        outcomes, even with dynamic backend behavior.  Using a practical example
        of building a rock-paper-scissors game, the speaker illustrates how this
        method allows for comprehensive UI testing within a minute per test
        case, while maintaining high reliability.  The session also touches upon
        the importance of documenting business rules and functionalities through
        tests, reducing reliance on individual team members and mitigating the
        risks associated with legacy code.  Learn how to create more effective
        and maintainable tests that contribute to overall software quality and
        team collaboration.


        0:00 | Introduction and Initial Hiccups

        0:22 | The Importance of End-to-End Testing

        0:40 | Writing Stable and Fast End-to-End Tests

        1:22 | Why Software Testing Matters

        2:23 | The Cost of Testing and the Limits of Unit Testing

        3:12 | Introduction to Effective Test Writing with Cucumber

        4:23 | Session Goal: Fast and Reliable End-to-End Tests

        5:57 | Documenting Business Rules and System Functionality

        7:45 | Escaping the Bottleneck: Documentation as Testing

        8:37 | Black Box Testing and Reducing Coupling

        9:09 | Using Cucumber and Gherkin for Requirements and Testing

        10:02 | Using Cucumber to Precondition Backends

        11:00 | Mocking Servers with PACT

