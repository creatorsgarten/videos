    snippet:
      title: Building Library Ecosystem in LMWN by Voraton Lertrattanapaisal
      description: >-
        คุณโอ๊ต Staff Software Engineer จาก LINE MAN Wongnai
        จะมาแชร์ประสบการณ์การสร้าง library ecosystem ภายในองค์กร 
        ฟังเรื่องราวเบื้องหลังการพัฒนา library ต่างๆ ตั้งแต่จุดเริ่มต้นเล็กๆ
        จนเติบโตเป็นระบบนิเวศที่ซับซ้อน  เรียนรู้ถึงปัญหาที่พบเจอจากการสร้าง
        library ขนาดใหญ่ที่ทำหน้าที่มากเกินไป และวิธีการแก้ไขด้วยการแตก library
        ออกเป็นส่วนย่อยๆ ที่ทำงานร่วมกัน  รวมถึงการใช้เครื่องมืออย่าง Kyo Roll
        Up และ Waraji Katsu ที่ช่วยลดความยุ่งยากในการ setup และสร้าง web
        application  มาดูกันว่า LINE MAN Wongnai บริหารจัดการ library
        อย่างไรให้มีประสิทธิภาพและสามารถนำกลับมาใช้ซ้ำได้ในหลายๆ โปรเจกต์ 
        พร้อมรับฟังเคล็ดลับการตั้งชื่อ library และแผนการพัฒนาในอนาคต


        0:00 | แนะนำตัวและหัวข้อ: สร้าง Library Ecosystem ใน LINE MAN Wongnai

