video:CaQ9fO1xto8:
  spec:
    id: CaQ9fO1xto8
    snippet:
      title: Human-AI Interactive Dancing · PROXENOROBOTICS by Perawit Boonsomchua
      description: >-
        ฟิล์ม อดีตเด็ก JSTP พาสำรวจจุดเริ่มต้นของ Proxenorobotics
        โปรเจกต์สร้างหุ่นยนต์จากปฏิสัมพันธ์ของโปรตีน 
        โดยเชื่อมโยงความสัมพันธ์ระหว่างวิทยาศาสตร์ ศิลปะ และปรัชญา
        ผ่านมุมมองที่ไม่เหมือนใคร  ฟิล์มจะพาคุณไปพบกับแรงบันดาลใจจากค่าย JSTP
        ที่จุดประกายความคิดสร้างสรรค์  รวมถึงการนำ concept
        ทางชีววิทยาและคณิตศาสตร์มาผสมผสานกันอย่างลงตัว  และการใช้ AI
        ในการถอดรหัสประวัติศาสตร์เบื้องหลังหุ่นยนต์ 
        มาร่วมค้นหาความเชื่อมโยงอันน่าสนใจระหว่างศาสตร์ต่างๆ
        และความเป็นไปได้ใหม่ๆ ในโลกของวิทยาศาสตร์และเทคโนโลยีไปพร้อมกัน


        00:00 | แนะนำตัวและที่มาของโปรเจกต์ JSTP สู่แรงบันดาลใจ

        01:18 | จุดเปลี่ยนจากค่าย JSTP สู่คำถามเกี่ยวกับโปรตีน

        02:43 | กำเนิด Proxenorobotics: หุ่นยนต์จากปฏิสัมพันธ์ของโปรตีน

        03:39 | Proxenorobotics: ความคิดสร้างสรรค์ที่เชื่อมโยงเคมีและชีววิทยา

        04:50 | การถอดรหัส EKG Signal ของหุ่นยนต์ด้วยคณิตศาสตร์

