video:i801jEbNmtk:
  spec:
    id: i801jEbNmtk
    snippet:
      title: >-
        Managing Context on Claude Code: These 5 mins will save you 5 hrs of
        waiting by Peerasak Unsakon
      description: >-
        พบกับคุณต้น Peerasak นักพัฒนา iOS และ indie dev เจ้าของแอป Pygmy
        กับเซสชันที่จะช่วยให้คุณใช้งาน Claude Code และ LLM
        ได้อย่างมีประสิทธิภาพผ่านการจัดการ context window อย่างเป็นระบบ
        คุณต้นจะพาไปทำความเข้าใจกลไกการทำงานของ AI ที่ไม่มีความจำในตัว
        และความสำคัญของการควบคุมจำนวน token ไม่ให้ชน limit จนเกินความจำเป็น


        0:00 | แนะนำตัวและประสบการณ์ในฐานะ iOS Developer

        1:08 | ทำไมเราต้องจัดการ Context และกลไกการนับ Token ของ LLM

        2:15 | ภาพจำลองการสะสม Token ที่เพิ่มขึ้นเรื่อยๆ ในทุก Turn

        3:50 | 4 กลยุทธ์หลักในการประหยัดและจัดการ Context

        4:36 | ตรวจสอบการใช้งานด้วย /context และระวังภาระจาก MCP Tools

        5:35 | เขียน CLAUDE.md ให้สั้นและกระชับเพื่อประหยัดพื้นที่

        6:37 | แบ่ง Task และใช้ Checklist เพื่อจัดการงานอย่างเป็นระบบ

        7:29 | ลดภาระ Context หลักด้วยการใช้ Sub-agent ทำงานเฉพาะกิจ

        9:18 | เคลียร์ Context ทุกครั้งที่จบงานด้วยคำสั่ง /clear

        10:03 | ใช้ Skill แทน MCP เพื่อโหลดสคริปต์เฉพาะตอนที่จำเป็น

        10:44 | บทสรุป: ทำงานให้คุ้มค่าที่สุดในแต่ละ Turn และการติดตามผลงาน


