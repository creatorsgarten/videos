        TypeScript Theatre: Coding Art Performances with Algorithms, AI and
        Assembly by Phoomparin Mano
      description: >-
        What happens when TypeScript takes the center stage in interactive art
        performances? This talk explores three of my art collaboration projects
        that pushes the boundaries of creative coding: an algorithmic Thai Khon
        dance performance, an AI-powered performance lecture on intelligences in
