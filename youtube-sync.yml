        AI Developers in Nowadays" โดยแนะนำการใช้งาน JavaScript ในการพัฒนา AI
        แบบ open source คุณโบ๊ทอธิบายถึงเครื่องมือต่างๆ เช่น GitHub Models,
        transformers.js และ Ollama.js พร้อมสาธิตการใช้งานจริง
